<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Lightbox Viewer</title>
  </head>

  <body>
    <main>
      <div class="gallery">
        <figure>
          <img
            class="gallery-item"
            alt="img"
            src="https://cdn.freecodecamp.org/curriculum/labs/stonehenge-thumbnail.jpg"
          />
          <figcaption>caption</figcaption>
        </figure>
        <figure>
          <img
            class="gallery-item"
            alt="img2"
            src="https://cdn.freecodecamp.org/curriculum/labs/storm-thumbnail.jpg"
          />
          <figcaption>caption</figcaption>
        </figure>
        <figure>
          <img
            class="gallery-item"
            alt="img3"
            src="https://cdn.freecodecamp.org/curriculum/labs/trees-thumbnail.jpg"
          />
          <figcaption>caption</figcaption>
        </figure>
      </div>
      <div class="lightbox">
        <figure>
          <img id="lightbox-image" />
        </figure>
        <button id="close-btn">&times;</button>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
